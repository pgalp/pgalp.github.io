# Site settings
baseurl = "/"
languageCode = "en-us"
title = "Snehapoorvam Collector -Alappuzha"
theme = "syna"
enableGitInfo = true
version = "0.17.3"

# Google Analytics tracking
googleAnalytics = ""

disableKinds = ["RSS", "taxonomy", "taxonomyTerm"]

[outputs]
  home = ["HTML", "JSON"]

[frontmatter]
date = ["date", "lastmod"]
lastmod = ["lastmod", ":git", "date"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
     unsafe = true

[params]
  name = "IT Mission Alappuzha"
  description = "Kerala State IT Mission"

  [params.style]
    #background = "secondary"

  # Theme customizations
  # Assets relative to 'static/'
  [params.custom]
    favicon = "favicon.ico"
    favicon_ico_sizes = "16x16 32x32"
    favicon_png = "favicon.png"
    favicon_svg = "favicon.svg"

  # Piwik tracking
  [params.analytics.piwik]
    #url = ""
    #id = ""
    #domain = "" # Track subdomains via "*.example.com"
    # Optional hash for integrity check
    #hash = "sha512-RfeD0pacGTqy9m7U6PgehQfS4cc7SIt+e+P+H5e848kEvB/RW84CUGO3O4O3LNbxjevym6KPUZ8muPsMrI8WIw=="

  # Optional, global disable switch for fontawesome related files
  # For custom fontawesome js files use the custom.js method
  [params.fontawesome]
    disabled = false
    pro = false

  [params.colors]
    primary = "#00838F"
    secondary = "#868e96"
    success = "#008f54"
    info = "#00c9dc"
    warning = "#fdf314"
    danger = "#dc1200"
    light = "#f8f9fa"
    dark = "#343a40"

# The following flag disables JS minification
# If you encounter issues with the dropdown menu and the JavaScript controlling
# it does not load properly, consider turning this to true.
# See https://github.com/okkur/syna/issues/859 
[minify]
disableJS = false

# main/prepend/postpend menus are displayed in nav fragment.
# Keep an eye out for updates. These will be moved out to make navbar more
# configurable.
[[menu.main]]
  url = "/"
  name = "Home"
  weight = 10

[[menu.main]]
  url = "/workflow"
  name = "Work Flow"
  weight = 30


[[menu.main]]
  url = "/about"
  name = "About Us"
  weight = 20

[[menu.main]]
  #url = "#contact"
  #name = "Contact"
  #weight = 30

[[menu.footer]]
  url = "https://edistrict.kerala.gov.in/"
  name = "eDistrict"
  weight = 30

[[menu.footer]]
  url = "https://itmission.kerala.gov.in/"
  name = "Kerala State IT Mission"
  weight = 30

[[menu.footer]]
  url = "/docs"
  name = "Docs"
  weight = 30

[[menu.copyright_footer]]
  url = "/about"
  name = "About Us"
  weight = 10

[[menu.copyright_footer]]
